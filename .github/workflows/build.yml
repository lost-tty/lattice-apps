name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [outliner, kanban, todo, inventory]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Run tests
        if: matrix.app == 'outliner'
        run: npm test
        working-directory: ${{ matrix.app }}

      - name: Build & bundle
        run: mkdir -p dist && npm run bundle
        working-directory: ${{ matrix.app }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}
          path: ${{ matrix.app }}/${{ matrix.app }}.lattice

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev release
        run: |
          gh release create latest \
            artifacts/outliner/outliner.lattice \
            artifacts/kanban/kanban.lattice \
            artifacts/todo/todo.lattice \
            artifacts/inventory/inventory.lattice \
            --title "Latest build ($(date -u +%Y-%m-%d))" \
            --notes "Built from main at $(git rev-parse --short HEAD)" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
