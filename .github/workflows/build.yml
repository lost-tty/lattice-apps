name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [outliner, kanban, todo, inventory]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Run tests
        if: matrix.app == 'outliner'
        run: npm test
        working-directory: ${{ matrix.app }}

      - name: Build & bundle zip
        run: mkdir -p dist && npm run bundle
        working-directory: ${{ matrix.app }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}
          path: ${{ matrix.app }}/${{ matrix.app }}.zip
